services:
  redis:
    image: redis:latest
    container_name: litellm-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - litellm-net
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: litellm-etcd
    command:
      - "etcd"
      - "-advertise-client-urls=http://etcd:2379"
      - "-listen-client-urls=http://0.0.0.0:2379"
      - "--data-dir=/etcd"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - litellm-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: litellm-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: ["minio", "server", "/data", "--address", ":9000", "--console-address", ":9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - litellm-net
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.4.10
    container_name: litellm-milvus
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
      - "2379:2379"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - litellm-net
    restart: unless-stopped

  db:
    image: postgres:16
    restart: always
    container_name: litellm-db
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: dbpassword9090
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U llmproxy"]
      interval: 1s
      timeout: 5s
      retries: 10
    networks:
      - litellm-net

  litellm:
    image: ghcr.io/berriai/litellm:latest
    container_name: litellm-proxy
    env_file:
      - .env
    command: ["--config", "/app/config/config.yaml", "--port", "4000", "--detailed_debug"]
    volumes:
      - ./config:/app/config:ro,z
    ports:
      - "4000:4000"
    # lemonade server lives on a separate LAN host. Map host.docker.internal
    # to the lemonade host IP. Override LEMONADE_HOST_IP in .env (or pass it
    # here) to point at a different LAN host. The :192.168.31.246 default
    # matches the Fedora dev box; on hosts where docker0 is UP, host-gateway
    # also works but is less portable.
    environment:
      DATABASE_URL: "postgresql://llmproxy:dbpassword9090@db:5432/litellm"
      # Optional: route read-only queries (find_*, count, group_by, query_raw/_first)
      # to a separate reader endpoint, e.g. an Aurora reader. Leave unset for
      # single-DB deployments. With IAM_TOKEN_DB_AUTH enabled, the reader URL
      # is auto-refreshed alongside the writer.
      # DATABASE_URL_READ_REPLICA: "postgresql://llmproxy:dbpassword9090@db-reader:5432/litellm"
      STORE_MODEL_IN_DB: "True" # allows adding models to proxy via UI
    extra_hosts:
      - "host.docker.internal:${LEMONADE_HOST_IP:-192.168.31.246}"
    healthcheck:
      # /health/readiness returns 200 only when the proxy + its DB-backed
      # store are both ready. Probing this from compose gives the
      # bootstrap script (scripts/up.sh) a real "litellm ready" gate;
      # the smoke suite (scripts/smoke.sh) hits the same endpoint from
      # the host loopback in t_proxy_ready.
      # The ghcr.io/berriai/litellm image is Alpine-based and ships only
      # busybox + python3 — no curl, no wget. Use python's urllib for
      # the HTTP probe.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness').read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - litellm-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: litellm-prometheus
    # No `user:` directive — runs as the image's default root so it can
    # write the TSDB at /prometheus (the named volume was originally
    # provisioned root-owned and cannot be chown'd without privileged
    # access). Secret files are mode 644 so the container can read them
    # without needing to match uid/gid.
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro,z
      - ./monitoring/secrets/litellm_master_key:/run/secrets/litellm_master_key:ro,z
      - ./monitoring/secrets/minio_metrics_user:/run/secrets/minio_metrics_user:ro,z
      - ./monitoring/secrets/minio_metrics_pass:/run/secrets/minio_metrics_pass:ro,z
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - litellm-net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: litellm-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro,z
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - litellm-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: litellm-grafana
    # No `user:` directive — runs as the image's default UID (472). The
    # grafana_admin_password secret file is mode 644 (group/world readable)
    # so the container can read it without privileged chown. Mode 644 is
    # acceptable here because: (1) the file lives only on the loopback
    # filesystem of a single-user dev box, (2) the credential is the
    # Grafana admin password (loopback-only) and (3) the value rotates by
    # re-running the openssl command in .env.example. The ideal plan was
    # mode 600 + chown 472:472, but the unprivileged `docker compose`
    # invocation cannot chown host bind-mounts.
    # NOTE: Grafana does NOT inherit env_file: .env — that would leak
    # DATABASE_URL (intended for the litellm service) into the Grafana
    # container, causing the image to switch its auth backend from
    # internal sqlite to external Postgres. Once that switch happens,
    # GF_SECURITY_ADMIN_PASSWORD__FILE no longer matches the seeded
    # admin user and Grafana silently falls back to default admin/admin.
    # The explicit environment: block below is the sole env source.
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Bind Grafana's internal HTTP listener to 3030 so the published
      # host:3030 -> container:3030 mapping actually reaches the server.
      GF_SERVER_HTTP_PORT: "3030"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro,z
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro,z
      - ./monitoring/secrets/grafana_admin_password:/run/secrets/grafana_admin_password:ro,z
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3030:3030"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3030/api/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - litellm-net
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: litellm-redis-exporter
    command: ["--redis.addr=redis://redis:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - litellm-net
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: litellm-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://llmproxy:dbpassword9090@db:5432/litellm?sslmode=disable"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h db -p 5432 -U llmproxy"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - litellm-net
    restart: unless-stopped

  attu:
    container_name: milvus-attu
    image: zilliz/attu:latest
    ports:
      - "3030:3000"
    environment:
      - MILVUS_ADDRESS=litellm-milvus:19530
    depends_on:
      - "litellm-milvus"

volumes:
  redis_data:
  milvus_data:
  minio_data:
  postgres_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

networks:
  litellm-net:
    driver: bridge
