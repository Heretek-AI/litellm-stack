global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: litellm
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/litellm_master_key
    static_configs:
      - targets: ["litellm:4000"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: milvus
    metrics_path: /metrics
    static_configs:
      - targets: ["milvus:9091"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    basic_auth:
      username_file: /run/secrets/minio_metrics_user
      password_file: /run/secrets/minio_metrics_pass
    static_configs:
      - targets: ["minio:9000"]

  - job_name: etcd
    static_configs:
      - targets: ["etcd:2379"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]